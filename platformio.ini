; =============================================================================
; ESP32-S3 Robotics Controller — PlatformIO Project Configuration
; =============================================================================
; Board:     Custom 4-layer PCB  (averyizatt/ESP32BasedRobiticsPCB)
; MCU:       ESP32-S3
; Framework: Arduino (arduino-esp32 2.x / ESP-IDF 4.4)
;
; Flash/upload:
;   First flash  — hold BOOT button, tap RESET, then upload.
;   Subsequent   — ESP32-S3 USB-CDC resets automatically.
; =============================================================================

[platformio]
src_dir     = firmware/ESP32RoboticsController
include_dir = firmware/ESP32RoboticsController
build_dir   = .pio/build
libdeps_dir = .pio/libdeps

; ---------------------------------------------------------------------------
; Default environment
; ---------------------------------------------------------------------------
[env:esp32s3]
platform  = espressif32 @ ^6.9.0
board     = esp32-s3-devkitc-1
framework = arduino

; Framework pinned via platform version (espressif32 ^6.9.0 bundles arduino-esp32 2.x).
; Using the registry package avoids a long hash-based path that breaks CreateProcess on Windows.

; --- ESP32-S3 Serial ---------------------------------------------------------
; Serial goes to UART0 (default).  Upload still works via USB-Serial/JTAG.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0

; --- Upload / monitor -------------------------------------------------------
upload_protocol = esptool
upload_speed    = 921600
monitor_speed   = 115200
monitor_rts     = 0
monitor_dtr     = 0
; Auto-reconnect when the CDC port drops during reset
monitor_filters = direct

; --- Libraries --------------------------------------------------------------
lib_deps =
    madhephaestus/ESP32Servo @ ^3.0.6
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.4

build_unflags = -Werror
